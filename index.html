<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleAI - Your Personal Stylist</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 800px;
        }
        h1 {
            color: #333;
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
        }
        .upload-area {
            border: 3px dashed #aaa;
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: border 0.3s, background 0.3s;
        }
        .upload-area:hover {
            border-color: #007bff;
            background: #f0f8ff;
        }
        #preview {
            max-width: 100%;
            max-height: 300px;
            margin-top: 1rem;
            border-radius: 10px;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .gender-selection {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0;
        }
        .gender-selection label {
            font-size: 1.1rem;
            cursor: pointer;
        }
        .gender-selection input {
            margin-right: 0.5rem;
            transform: scale(1.2);
        }
        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            display: block;
            margin: 0 auto;
            transition: background 0.3s, transform 0.2s;
        }
        .btn:hover {
            background: #0056b3;
            transform: scale(1.05);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .loading {
            display: none;
            text-align: center;
            margin: 2rem 0;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .results {
            display: none;
            margin-top: 2rem;
            background: #f9f9f9;
            padding: 2rem;
            border-radius: 15px;
        }
        .results h2 {
            color: #333;
            margin-top: 0;
        }
        .results h3 {
            color: #007bff;
            margin: 1rem 0 0.5rem;
        }
        .results p {
            line-height: 1.6;
            color: #555;
        }
        .product-card {
            background: white;
            border-radius: 10px;
            padding: 1rem;
            margin: 1rem 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 4px solid #007bff;
        }
        .product-card h4 {
            margin: 0 0 0.5rem;
            color: #333;
        }
        .product-card a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
        .product-card a:hover {
            text-decoration: underline;
        }
        .outfit-suggestions {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }
        .outfit-category {
            background: white;
            padding: 1rem;
            border-radius: 10px;
        }
        .outfit-category strong {
            color: #007bff;
            display: block;
            margin-bottom: 0.5rem;
        }
        .outfit-category ul {
            margin: 0;
            padding-left: 1.2rem;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ StyleAI</h1>
        <p class="subtitle">Your intelligent personal fashion stylist</p>

        <form id="uploadForm" enctype="multipart/form-data">
            <div class="upload-area" id="dropArea">
                <p>📸 Drag & Drop your photo here or <span style="color:#007bff; cursor:pointer;">click to browse</span></p>
                <input type="file" id="fileInput" name="photo" accept="image/png, image/jpeg, image/gif, image/webp" style="display: none;" required>
                <img id="preview" src="#" alt="Preview">
            </div>

            <div class="gender-selection">
                <label>
                    <input type="radio" name="gender" value="male"> Male
                </label>
                <label>
                    <input type="radio" name="gender" value="female" checked> Female
                </label>
            </div>

            <button type="submit" class="btn" id="submitBtn">Get Styling Advice</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing your style... This may take a moment.</p>
        </div>

        <div class="results" id="results">
            <h2>Your Personal Style Report</h2>
            <p><strong>Detected Skin Tone:</strong> <span id="skinTone"></span> (<span id="rgb"></span>)</p>
            <h3 id="styleSummary"></h3>

            <h3>Outfit Suggestions</h3>
            <div id="outfitSuggestions" class="outfit-suggestions"></div>

            <h3>Recommended Products</h3>
            <div id="productList"></div>

            <h3>Styling Tips</h3>
            <p id="stylingTips"></p>
        </div>
    </div>

    <script>
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const form = document.getElementById('uploadForm');
        const loadingDiv = document.getElementById('loading');
        const resultsDiv = document.getElementById('results');
        const skinToneSpan = document.getElementById('skinTone');
        const rgbSpan = document.getElementById('rgb');
        const styleSummaryH3 = document.getElementById('styleSummary');
        const outfitDiv = document.getElementById('outfitSuggestions');
        const productDiv = document.getElementById('productList');
        const tipsP = document.getElementById('stylingTips');
        const submitBtn = document.getElementById('submitBtn');

        // Drag & Drop
        dropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropArea.style.borderColor = '#007bff';
        });

        dropArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropArea.style.borderColor = '#aaa';
        });

        dropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropArea.style.borderColor = '#aaa';
            const file = e.dataTransfer.files[0];
            if (file) {
                fileInput.files = e.dataTransfer.files;
                showPreview(file);
            }
        });

        dropArea.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) showPreview(file);
        });

        function showPreview(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);

            // Disable button and show loading
            submitBtn.disabled = true;
            loadingDiv.style.display = 'block';
            resultsDiv.style.display = 'none';

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    alert(data.error);
                    submitBtn.disabled = false;
                    loadingDiv.style.display = 'none';
                    return;
                }

                // Populate results
                skinToneSpan.textContent = data.skin_tone;
                rgbSpan.textContent = `${data.rgb[0]}, ${data.rgb[1]}, ${data.rgb[2]}`;
                styleSummaryH3.textContent = data.recommendations.style_summary || 'Your Style';
                tipsP.textContent = data.recommendations.styling_tips || 'No tips available.';

                // Outfit suggestions
                let outfitHtml = '';
                const outfits = data.recommendations.outfit_suggestions || {};
                for (const [category, items] of Object.entries(outfits)) {
                    if (items && items.length) {
                        outfitHtml += `
                            <div class="outfit-category">
                                <strong>${category.charAt(0).toUpperCase() + category.slice(1)}</strong>
                                <ul>
                                    ${items.map(item => `<li>${item}</li>`).join('')}
                                </ul>
                            </div>
                        `;
                    }
                }
                outfitDiv.innerHTML = outfitHtml;

                // Product recommendations
                let productHtml = '';
                const products = data.recommendations.product_recommendations || [];
                products.forEach(prod => {
                    productHtml += `
                        <div class="product-card">
                            <h4>${prod.name}</h4>
                            <p>${prod.description} - <strong>${prod.price}</strong></p>
                            <a href="${prod.purchase_link}" target="_blank">View on Amazon</a>
                        </div>
                    `;
                });
                if (productHtml === '') {
                    productHtml = '<p>No specific product links available right now.</p>';
                }
                productDiv.innerHTML = productHtml;

                // Show results
                resultsDiv.style.display = 'block';
                submitBtn.disabled = false;
                loadingDiv.style.display = 'none';

            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
                submitBtn.disabled = false;
                loadingDiv.style.display = 'none';
            }
        });
    </script>
</body>
</html>
